version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: compliance-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: compliance_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: compliance-api-image:latest
    container_name: compliance-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/compliance_tracker?schema=public
      JWT_SECRET: supersecretjwtcomplianceloginkey
      PORT: 5000
    depends_on:
      - postgres

volumes:
  postgres_data:
