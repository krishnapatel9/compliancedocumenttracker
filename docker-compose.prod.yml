version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: compliance-db-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: productionsecurepasswordhere
      POSTGRES_DB: compliance_tracker_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: compliance-api-image:latest
    container_name: compliance-api-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:productionsecurepasswordhere@postgres:5432/compliance_tracker_prod?schema=public
      JWT_SECRET: productionsecurejwtkeythatisreallylongandsecure
      PORT: 5000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: compliance-frontend-image-prod:latest
    container_name: compliance-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_prod_data:
